<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI-COACH — דשבורד מאמן</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080e;--s1:#101018;--s2:#181820;--s3:#202028;
  --b1:#282838;--b2:#383850;
  --ac:#7c6fff;--ac2:#ff6b8a;--ac3:#3de87a;--ac4:#64b5f6;--ac5:#ffb347;
  --tx:#eeeef8;--tx2:#9090b8;--tx3:#5a5a80;
  --glow:rgba(124,111,255,0.2);
  --f:'Heebo',sans-serif;--fm:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--f);min-height:100vh;}

.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--b1);
  background:rgba(8,8,14,0.92);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:99;
}
.nav-logo{font-family:var(--fm);font-size:15px;color:var(--ac);letter-spacing:3px;}
.nav-logo small{display:block;color:var(--tx3);font-size:10px;margin-top:1px;}
.nav-badge{
  display:flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:20px;font-size:11px;font-family:var(--fm);
  background:rgba(124,111,255,0.1);border:1px solid rgba(124,111,255,0.2);
  color:var(--ac);letter-spacing:1px;
}
.nav-link{color:var(--tx2);font-size:13px;padding:7px 14px;border-radius:7px;text-decoration:none;border:1px solid transparent;transition:all .2s;}
.nav-link:hover{color:var(--tx);border-color:var(--b1);}

.wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}

.page-hd{margin-bottom:28px;}
.page-hd h1{font-size:26px;font-weight:900;}
.page-hd p{color:var(--tx2);font-size:13px;margin-top:4px;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px;}
.kpi-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:13px;padding:18px;
  transition:all .2s;cursor:default;
}
.kpi-card:hover{border-color:var(--b2);transform:translateY(-1px);}
.kpi-num{font-size:34px;font-weight:900;font-family:var(--fm);margin-bottom:3px;}
.kpi-lbl{font-size:11px;color:var(--tx2);}
.kpi-green .kpi-num{color:var(--ac3);}
.kpi-purple .kpi-num{color:var(--ac);}
.kpi-pink .kpi-num{color:var(--ac2);}
.kpi-blue .kpi-num{color:var(--ac4);}
.kpi-orange .kpi-num{color:var(--ac5);}

/* SEARCH & FILTER */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.search-box{
  flex:1;min-width:180px;
  background:var(--s1);border:1px solid var(--b1);color:var(--tx);
  padding:9px 13px;border-radius:8px;font-family:var(--f);font-size:14px;
  transition:all .2s;
}
.search-box:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px var(--glow);}
.filter-btn{
  padding:9px 14px;border-radius:8px;font-size:12px;cursor:pointer;
  border:1px solid var(--b1);background:var(--s1);color:var(--tx2);
  font-family:var(--f);transition:all .15s;
}
.filter-btn.on{border-color:var(--ac);background:rgba(124,111,255,0.1);color:var(--ac);}

/* ATHLETES GRID */
.ath-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}

.ath-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.ath-card::before{
  content:'';position:absolute;top:0;right:0;width:3px;height:100%;
  background:var(--b1);transition:background .2s;
}
.ath-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.3);}
.ath-card:hover::before{background:var(--ac);}

.ath-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.ath-name{font-size:16px;font-weight:700;}
.ath-since{font-size:10px;color:var(--tx3);font-family:var(--fm);margin-top:2px;}
.lvl{
  padding:3px 9px;border-radius:10px;font-size:9px;font-family:var(--fm);
  letter-spacing:1px;flex-shrink:0;
}
.lvl-beginner{background:rgba(61,232,122,0.08);color:var(--ac3);border:1px solid rgba(61,232,122,0.15);}
.lvl-intermediate{background:rgba(124,111,255,0.08);color:var(--ac);border:1px solid rgba(124,111,255,0.15);}
.lvl-advanced{background:rgba(255,107,138,0.08);color:var(--ac2);border:1px solid rgba(255,107,138,0.15);}

.ath-meta{font-size:12px;color:var(--tx2);margin-bottom:12px;line-height:1.5;}
.ath-stats{display:flex;gap:12px;}
.ath-stat{display:flex;flex-direction:column;gap:2px;}
.ath-stat-n{font-size:16px;font-weight:700;font-family:var(--fm);}
.ath-stat-l{font-size:9px;color:var(--tx3);}

.last-sess{
  margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);
  font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:6px;
}
.last-dot{width:5px;height:5px;border-radius:50%;background:var(--ac3);}

/* EMPTY */
.empty{text-align:center;padding:56px 20px;color:var(--tx2);}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--tx);}

/* MODAL */
.overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:16px;
}
.overlay.on{display:flex;}
.modal{
  background:var(--s1);border:1px solid var(--b1);border-radius:18px;
  padding:26px;max-width:620px;width:100%;max-height:85vh;overflow-y:auto;
}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;}
.modal-close{
  background:none;border:none;color:var(--tx2);font-size:20px;
  cursor:pointer;padding:4px;line-height:1;transition:color .2s;
}
.modal-close:hover{color:var(--ac2);}

.modal-athlete-hd{margin-bottom:16px;}
.modal-athlete-hd h2{font-size:22px;font-weight:900;margin-bottom:4px;}
.modal-athlete-hd p{color:var(--tx2);font-size:13px;}

.modal-kpis{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.mkpi{background:var(--s2);border-radius:9px;padding:12px 16px;text-align:center;}
.mkpi-n{font-size:20px;font-weight:700;font-family:var(--fm);color:var(--ac);}
.mkpi-l{font-size:10px;color:var(--tx2);margin-top:2px;}

.sess-list{display:flex;flex-direction:column;gap:8px;}
.sess-item{
  background:var(--s2);border-radius:10px;padding:13px 15px;
  border:1px solid var(--b1);transition:border-color .2s;
}
.sess-item:hover{border-color:var(--b2);}
.sess-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sess-goal{font-size:14px;font-weight:600;}
.sess-badge{
  padding:2px 9px;border-radius:8px;font-size:9px;font-family:var(--fm);letter-spacing:1px;
}
.sb-APPROVED{background:rgba(61,232,122,0.08);color:var(--ac3);}
.sb-PEAK{background:rgba(255,107,138,0.08);color:var(--ac2);}
.sb-DELOAD{background:rgba(255,193,7,0.08);color:#ffc107;}
.sb-RECOVERY{background:rgba(124,111,255,0.08);color:var(--ac);}
.sess-meta{display:flex;gap:12px;font-size:11px;color:var(--tx3);font-family:var(--fm);}

.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--b1);padding-bottom:12px;}
.tab-btn{
  padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;
  border:1px solid transparent;background:none;color:var(--tx2);
  font-family:var(--f);transition:all .15s;
}
.tab-btn.on{border-color:var(--b1);background:var(--s2);color:var(--tx);}

.workout-preview{
  background:var(--s2);border-radius:10px;padding:14px;border:1px solid var(--b1);
  margin-top:8px;
}
.wp-title{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ac);}
.wp-phase{margin-bottom:6px;}
.wp-phase-name{font-size:10px;font-family:var(--fm);color:var(--tx3);letter-spacing:1px;margin-bottom:4px;}
.wp-ex{font-size:12px;color:var(--tx2);padding:2px 0;display:flex;align-items:center;gap:6px;}
.wp-ex::before{content:'·';color:var(--ac);}

.toast{
  position:fixed;bottom:18px;right:18px;z-index:600;
  padding:11px 16px;border-radius:9px;font-size:12px;
  background:var(--s2);border:1px solid var(--b1);
  opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:var(--ac3);color:var(--ac3);}
.toast.err{border-color:var(--ac2);color:var(--ac2);}

.spin{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid var(--b2);border-top-color:var(--ac);animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  .ath-grid{grid-template-columns:1fr;}
  .kpi-row{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">OMNI-COACH<small>COACH DASHBOARD</small></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="nav-badge">📊 מאמן</div>
    <a href="/athlete.html" class="nav-link">🏋️ למתאמן →</a>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- OVERLAY / MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-top">
      <div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody">טוען...</div>
  </div>
</div>

<div class="wrap">

  <!-- HEADER -->
  <div class="page-hd">
    <h1>📊 דשבורד מאמן</h1>
    <p>מעקב בזמן אמת אחר כל המתאמנים והאימונים שלהם</p>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi-card kpi-purple">
      <div class="kpi-num" id="kTot">–</div>
      <div class="kpi-lbl">סה"כ מתאמנים</div>
    </div>
    <div class="kpi-card kpi-green">
      <div class="kpi-num" id="kWeek">–</div>
      <div class="kpi-lbl">אימונים השבוע</div>
    </div>
    <div class="kpi-card kpi-blue">
      <div class="kpi-num" id="kActive">–</div>
      <div class="kpi-lbl">פעילים ב-30 יום</div>
    </div>
    <div class="kpi-card kpi-orange">
      <div class="kpi-num" id="kAvgR">–</div>
      <div class="kpi-lbl">ממוצע מוכנות</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="🔍  חיפוש מתאמן..." oninput="filterAthletes()">
    <button class="filter-btn on" onclick="setFilter('all',this)">הכל</button>
    <button class="filter-btn" onclick="setFilter('beginner',this)">מתחיל</button>
    <button class="filter-btn" onclick="setFilter('intermediate',this)">בינוני</button>
    <button class="filter-btn" onclick="setFilter('advanced',this)">מתקדם</button>
    <button class="filter-btn" onclick="loadDashboard()" style="margin-right:auto;">🔄 רענן</button>
  </div>

  <!-- ATHLETES -->
  <div id="athGrid" class="ath-grid">
    <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--tx2);">
      <div class="spin"></div> טוען מתאמנים...
    </div>
  </div>

</div>

<script>
const SUPA_URL = 'https://sbjpwzfmnjqpqzwcmasj.supabase.co';
const SUPA_KEY = 'sb_publishable_933E3dFux_-fmizVmnzVfA_tSZDhtwE';

let allAthletes = [];
let currentFilter = 'all';

async function loadDashboard() {
  await Promise.all([loadStats(), loadAthletes()]);
}

async function loadStats() {
  try {
    const r = await fetch('/api/coach-data?type=stats');
    const s = await r.json();
    document.getElementById('kTot').textContent = s.total_athletes ?? '0';
    document.getElementById('kWeek').textContent = s.week_sessions ?? '0';
  } catch(e) { console.error(e); }
}

async function loadAthletes() {
  try {
    const r = await fetch('/api/coach-data?type=athletes');
    allAthletes = await r.json();
    if(!Array.isArray(allAthletes)) allAthletes = [];

    // Compute additional KPIs
    const thirtyDays = Date.now() - 30*864e5;
    let active = 0, totalReadiness = 0, readinessCount = 0;
    allAthletes.forEach(a => {
      const lastSess = a.sessions?.[0];
      if(lastSess && new Date(lastSess.created_at).getTime() > thirtyDays) active++;
      if(lastSess?.readiness_score){ totalReadiness += lastSess.readiness_score; readinessCount++; }
    });
    document.getElementById('kActive').textContent = active;
    document.getElementById('kAvgR').textContent = readinessCount ? (totalReadiness/readinessCount).toFixed(1) : '–';

    renderAthletes(allAthletes);
  } catch(e) {
    document.getElementById('athGrid').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>שגיאה בטעינה</h3><p>${e.message}</p></div>`;
  }
}

function renderAthletes(list) {
  if(!list.length) {
    document.getElementById('athGrid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🏋️</div>
        <h3>אין מתאמנים עדיין</h3>
        <p>שלח מתאמנים לדף האימון כדי לראות אותם כאן</p>
      </div>`;
    return;
  }

  document.getElementById('athGrid').innerHTML = list.map(a => {
    const sess = a.sessions || [];
    const last = sess[0];
    const lastDate = last ? new Date(last.created_at).toLocaleDateString('he-IL') : '–';
    const lastGoal = last?.goal || '';
    const totalSess = sess.length;
    const daysSince = last ? Math.round((Date.now()-new Date(last.created_at))/864e5) : null;
    const dotColor = daysSince === null ? 'var(--tx3)' : daysSince <= 3 ? 'var(--ac3)' : daysSince <= 7 ? 'var(--ac5)' : 'var(--ac2)';

    return `<div class="ath-card" onclick="openAthlete('${a.id}')">
      <div class="ath-top">
        <div>
          <div class="ath-name">${a.name||'ללא שם'}</div>
          <div class="ath-since">נרשם ${new Date(a.created_at||Date.now()).toLocaleDateString('he-IL')}</div>
        </div>
        <div class="lvl lvl-${a.level||'beginner'}">${a.level||'beginner'}</div>
      </div>
      <div class="ath-meta">${a.goal||'–'} · ${a.age ? a.age+' שנים' : ''} · ${a.weight_kg ? a.weight_kg+'ק"ג' : ''}</div>
      <div class="ath-stats">
        <div class="ath-stat"><div class="ath-stat-n" style="color:var(--ac)">${totalSess}</div><div class="ath-stat-l">אימונים</div></div>
        ${last?.readiness_score?`<div class="ath-stat"><div class="ath-stat-n" style="color:var(--ac4)">${last.readiness_score}</div><div class="ath-stat-l">מוכנות אחרון</div></div>`:''}
        ${daysSince!==null?`<div class="ath-stat"><div class="ath-stat-n" style="color:${dotColor}">${daysSince}</div><div class="ath-stat-l">ימים מאחרון</div></div>`:''}
      </div>
      <div class="last-sess">
        <div class="last-dot" style="background:${dotColor}"></div>
        ${last ? `אחרון: ${lastDate} · ${lastGoal}` : 'לא אימן עדיין'}
      </div>
    </div>`;
  }).join('');
}

function filterAthletes() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  let filtered = allAthletes;
  if(currentFilter !== 'all') filtered = filtered.filter(a => a.level === currentFilter);
  if(q) filtered = filtered.filter(a => (a.name||'').toLowerCase().includes(q));
  renderAthletes(filtered);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  filterAthletes();
}

async function openAthlete(userId) {
  const athlete = allAthletes.find(a => a.id === userId);
  if(!athlete) return;

  document.getElementById('modalBody').innerHTML = `<div style="text-align:center;padding:20px;color:var(--tx2)"><div class="spin"></div> טוען...</div>`;
  document.getElementById('overlay').classList.add('on');

  try {
    const r = await fetch(`/api/coach-data?type=sessions&user_id=${userId}`);
    const sessions = await r.json();

    let avgReadiness = 0, count = 0;
    sessions.forEach(s => { if(s.readiness_score){ avgReadiness+=s.readiness_score; count++; } });
    avgReadiness = count ? (avgReadiness/count).toFixed(1) : '–';

    const html = `
      <div class="modal-athlete-hd">
        <h2>${athlete.name||'ללא שם'}</h2>
        <p style="color:var(--tx2)">${athlete.goal||''} · ${athlete.level||''} · ${athlete.age||''}שנים · ${athlete.weight_kg||''}ק"ג</p>
      </div>
      <div class="modal-kpis">
        <div class="mkpi"><div class="mkpi-n">${sessions.length}</div><div class="mkpi-l">סה"כ אימונים</div></div>
        <div class="mkpi"><div class="mkpi-n" style="color:var(--ac4)">${avgReadiness}</div><div class="mkpi-l">ממוצע מוכנות</div></div>
        ${athlete.weight_kg?`<div class="mkpi"><div class="mkpi-n" style="color:var(--ac5)">${athlete.weight_kg}</div><div class="mkpi-l">משקל ק"ג</div></div>`:''}
      </div>

      <div class="tab-bar">
        <button class="tab-btn on" onclick="showTab('history',this)">היסטוריה</button>
        <button class="tab-btn" onclick="showTab('workouts',this)">תוכניות אימון</button>
      </div>

      <div id="tabHistory">
        ${sessions.length ? `<div class="sess-list">${sessions.map(s => {
          const d = new Date(s.created_at).toLocaleDateString('he-IL');
          const t = new Date(s.created_at).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
          return `<div class="sess-item">
            <div class="sess-top">
              <div class="sess-goal">${s.goal||'אימון'}</div>
              <div class="sess-badge sb-${s.status||'APPROVED'}">${s.status||'–'}</div>
            </div>
            <div class="sess-meta">
              <span>📅 ${d} ${t}</span>
              <span>🏠 ${s.environment||'–'}</span>
              ${s.readiness_score?`<span>⚡ מוכנות ${s.readiness_score}</span>`:''}
              ${s.estimated_time_mins?`<span>⏱ ${s.estimated_time_mins} דק'</span>`:''}
            </div>
          </div>`;
        }).join('')}</div>` : '<div style="color:var(--tx2);text-align:center;padding:20px;">אין אימונים עדיין</div>'}
      </div>

      <div id="tabWorkouts" style="display:none">
        ${sessions.filter(s=>s.workout_json).slice(0,5).map(s => {
          const w = s.workout_json;
          const d = new Date(s.created_at).toLocaleDateString('he-IL');
          const phases = (w.phases||[]).filter(p=>p.exercises?.length&&p.phase!=='warmup'&&p.phase!=='cooldown');
          return `<div class="workout-preview">
            <div class="wp-title">📋 ${d} · ${w.session_metadata?.goal||''}</div>
            ${phases.map(p=>`
              <div class="wp-phase">
                <div class="wp-phase-name">${p.label||p.phase}</div>
                ${(p.exercises||[]).map(ex=>`<div class="wp-ex">${ex.he_name||ex.id} — ${ex.sets||''}×${ex.target_reps||''} ${ex.target_weight_kg?ex.target_weight_kg+'ק"ג':''}</div>`).join('')}
              </div>`).join('')}
          </div>`;
        }).join('') || '<div style="color:var(--tx2);text-align:center;padding:20px;">אין תוכניות שמורות</div>'}
      </div>`;

    document.getElementById('modalBody').innerHTML = html;
  } catch(e) {
    document.getElementById('modalBody').innerHTML = `<p style="color:var(--ac2)">שגיאה: ${e.message}</p>`;
  }
}

function showTab(name, btn) {
  document.getElementById('tabHistory').style.display = name==='history'?'block':'none';
  document.getElementById('tabWorkouts').style.display = name==='workouts'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+type;
  setTimeout(()=>t.classList.remove('show'),3500);
}

loadDashboard();
</script>
